<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.device {
  width: 360px;
  height: 600px;
  background: #020617;
  border: 2px solid white;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  align-items: center;
  padding: 10px;
  border-bottom: 2px solid white;
}

.logo {
  height: 40px;
}

.screen {
  flex: 1;
  padding: 15px;
  text-align: center;
}

input {
  padding: 10px;
  font-size: 16px;
  border: 2px solid white;
  background: black;
  color: white;
  width: 80%;
}

button {
  margin-top: 10px;
  padding: 15px;
  border: 2px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

button:active {
  background: white;
  color: black;
}

.msg {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="device">
  
  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <div class="screen">
    <div>Введите PIN:</div>
    <input type="password" id="pin">
    
    <br>
    <button onclick="login()">Войти</button>

    <div class="msg" id="msg"></div>
  </div>

</div>

<script>
let balance = 1000;

function login() {
  document.getElementById("msg").innerHTML = `
    Баланс: ${balance}₽<br><br>
    <button onclick="withdraw()">Снять 100</button><br>
    <button onclick="exit()">Выход</button>
  `;
}

function withdraw() {
  balance -= 100;
  document.getElementById("msg").innerHTML = `
    Вы сняли 100₽<br>
    Баланс: ${balance}₽<br><br>
    <button onclick="exit()">Завершить</button>
  `;
}

function exit() {
  document.getElementById("msg").innerHTML = `
    Пожалуйста, заберите карту и деньги.
  `;
}
</script>

</body>
</html>
