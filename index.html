<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Night Bank</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #020617;
}

.logo {
  height: 40px;
  margin-right: 10px;
}

.screen {
  padding: 20px;
  text-align: center;
}

input {
  padding: 10px;
  font-size: 16px;
  border: 2px solid white;
  background: black;
  color: white;
  border-radius: 0;
}

button {
  margin-top: 10px;
  padding: 15px;
  border: 2px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  border-radius: 0;
}

button:active {
  background: white;
  color: black;
}

.message {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div>Night Bank</div>
</div>

<div class="screen">
  <div>Введите PIN:</div>
  <input type="password" id="pin">

  <br>
  <button onclick="checkPin()">Войти</button>

  <div class="message" id="msg"></div>
</div>

<script>
let balance = 1000;

function checkPin() {
  let pin = document.getElementById("pin").value;
  if (pin === "1234") {
    document.getElementById("msg").innerHTML = `
      Баланс: ${balance}₽<br><br>
      <button onclick="withdraw()">Снять 100</button>
      <button onclick="showExit()">Выход</button>
    `;
  } else {
    document.getElementById("msg").innerText = "Неверный PIN";
  }
}

function withdraw() {
  if (balance >= 100) {
    balance -= 100;
    document.getElementById("msg").innerHTML = `
      Вы сняли 100₽<br>
      Баланс: ${balance}₽<br><br>
      <button onclick="showExit()">Завершить</button>
    `;
  } else {
    alert("Недостаточно средств");
  }
}

function showExit() {
  document.getElementById("msg").innerHTML = `
    Пожалуйста, заберите карту и деньги.
  `;
}
</script>

</body>
  </html>
