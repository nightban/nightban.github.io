<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
  margin: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* “планшет” 20:15 */
.atm {
  display: flex;
  align-items: center;
  width: 600px;
  height: 450px;
}

/* боковые кнопки */
.side {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
}

/* сами кнопки */
.side button {
  width: 100px;
  height: 60px;
  background: black;
  color: white;
  border: none; /* УБРАЛИ КОНТУР */
}

/* экран */
.device {
  flex: 1;
  height: 100%;
  background: white;
  display: flex;
  flex-direction: column;
}

/* верх */
.header {
  padding: 5px;
}

/* логотип */
.logo {
  height: 30px;
}

/* экран */
.screen {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 10px;
}

/* кнопки внизу */
.bottom {
  padding: 5px;
  text-align: center;
}

/* кнопки внутри */
button {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="atm">

  <!-- СЛЕВА -->
  <div class="side" id="leftButtons"></div>

  <!-- ЭКРАН -->
  <div class="device">

    <div class="header">
      <img src="logo.png" class="logo">
    </div>

    <div class="screen" id="screen">
      <div>Вставьте карту</div>
      <button onclick="start()">Я вставил карту</button>
    </div>

  </div>

  <!-- СПРАВА -->
  <div class="side" id="rightButtons"></div>

</div>

<script>
let balance = 1000;
let input = "";

function start() {
  showPin();
}

function showPin() {
  document.getElementById("screen").innerHTML = `
    <div>Введите PIN</div>
    <div>${"*".repeat(input.length)}</div>
  `;

  document.getElementById("leftButtons").innerHTML = `
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
  `;

  document.getElementById("rightButtons").innerHTML = `
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="login()">OK</button>
  `;
}

function press(n) {
  if (input.length < 4) {
    input += n;
    showPin();
  }
}

function login() {
  showMenu();
}

function showMenu() {
  document.getElementById("screen").innerHTML = `
    Баланс: ${balance}₽
  `;

  document.getElementById("leftButtons").innerHTML = `
    <button onclick="withdraw()">Снять</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
  `;

  document.getElementById("rightButtons").innerHTML = `
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button onclick="exit()">Выход</button>
  `;
}

function withdraw() {
  balance -= 100;
  document.getElementById("screen").innerHTML = `
    Вы сняли 100₽
  `;
}

function exit() {
  document.getElementById("screen").innerHTML = `
    Пожалуйста, заберите карту и деньги
  `;
}
</script>

</body>
</html>
