<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* экран планшета */
.device {
  width: 400px;
  height: 700px;
  background: #052e16; /* зелёный фон */
  border: 3px solid white;
  display: flex;
  flex-direction: column;
}

/* верх */
.header {
  padding: 10px;
  border-bottom: 2px solid white;
}

.logo {
  height: 40px;
}

/* экран */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 20px;
}

input {
  padding: 10px;
  font-size: 18px;
  border: 2px solid white;
  background: black;
  color: white;
  width: 80%;
}

button {
  margin-top: 10px;
  padding: 15px;
  border: 2px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

button:active {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="device">

  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <div class="screen" id="screen">
    <!-- старт -->
    <div>Вставьте карту</div>
    <button onclick="cardInserted()">Я вставил карту</button>
  </div>

</div>

<script>
let balance = 1000;

function cardInserted() {
  document.getElementById("screen").innerHTML = `
    <div>Введите PIN:</div>
    <input type="password" id="pin">
    <button onclick="login()">Войти</button>
  `;
}

function login() {
  // любой PIN проходит
  showMenu();
}

function showMenu() {
  document.getElementById("screen").innerHTML = `
    <div>Баланс: ${balance}₽</div>
    <button onclick="withdraw()">Снять 100</button>
    <button onclick="showExit()">Выход</button>
  `;
}

function withdraw() {
  balance -= 100;
  document.getElementById("screen").innerHTML = `
    <div>Вы сняли 100₽</div>
    <div>Баланс: ${balance}₽</div>
    <button onclick="showExit()">Завершить</button>
  `;
}

function showExit() {
  document.getElementById("screen").innerHTML = `
    <div>Пожалуйста, заберите карту и деньги</div>
  `;
}
</script>

</body>
</html>
