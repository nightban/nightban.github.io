<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
  margin: 0;
  background: white; /* ВЕСЬ ФОН БЕЛЫЙ */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.atm {
  display: flex;
  align-items: center;
}

/* БОКОВЫЕ КНОПКИ */
.side {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.side button {
  width: 90px;
  padding: 10px;
  background: black;
  color: white;
  border: 2px solid black;
}

/* МЕНЬШИЙ ЭКРАН */
.device {
  width: 300px;   /* уменьшили */
  height: 450px;  /* уменьшили */
  background: white;
  border: 2px solid black;
  display: flex;
  flex-direction: column;
}

/* ЛОГО */
.header {
  padding: 5px;
  border-bottom: 2px solid black;
}

.logo {
  height: 30px;
}

/* ЭКРАН */
.screen {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 10px;
  font-size: 14px; /* уменьшили текст */
}

/* кнопки */
button {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="atm">

  <div class="side" id="leftButtons"></div>

  <div class="device">

    <div class="header">
      <img src="logo.png" class="logo">
    </div>

    <div class="screen" id="screen">
      <div>Вставьте карту</div>
      <button onclick="start()">Я вставил карту</button>
    </div>

  </div>

  <div class="side" id="rightButtons"></div>

</div>

<script>
let balance = 1000;
let input = "";

function start() {
  showPin();
}

function showPin() {
  document.getElementById("screen").innerHTML = `
    <div>Введите PIN</div>
    <div>${"*".repeat(input.length)}</div>
  `;

  document.getElementById("leftButtons").innerHTML = `
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
  `;

  document.getElementById("rightButtons").innerHTML = `
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="login()">OK</button>
  `;
}

function press(n) {
  if (input.length < 4) {
    input += n;
    showPin();
  }
}

function login() {
  showMenu();
}

function showMenu() {
  document.getElementById("screen").innerHTML = `
    Баланс: ${balance}₽
  `;

  document.getElementById("leftButtons").innerHTML = `
    <button onclick="withdraw()">Снять</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
  `;

  document.getElementById("rightButtons").innerHTML = `
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button>-</button>
    <button onclick="exit()">Выход</button>
  `;
}

function withdraw() {
  document.getElementById("screen").innerHTML = `
    Снято 100₽
  `;
  balance -= 100;
}

function exit() {
  document.getElementById("screen").innerHTML = `
    Пожалуйста, заберите карту и деньги
  `;
}
</script>

</body>
</html>
