<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title></title>

<style>
body {
  margin: 0;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* экран */
.device {
  width: 400px;
  height: 700px;
  background: white;
  border: 3px solid black;
  display: flex;
  flex-direction: column;
}

/* логотип */
.header {
  padding: 10px;
  border-bottom: 2px solid black;
}

.logo {
  height: 40px;
}

/* экран внутри */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: black;
}

/* PIN отображение */
.pin-display {
  font-size: 22px;
  margin-bottom: 20px;
  letter-spacing: 5px;
}

/* кнопки */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 10px;
}

button {
  padding: 20px;
  font-size: 18px;
  background: black;
  color: white;
  border: 2px solid black;
  cursor: pointer;
}

button:active {
  background: #333;
}
</style>
</head>

<body>

<div class="device">

  <div class="header">
    <img src="logo.png" class="logo">
  </div>

  <div class="screen" id="screen">
    <div>Введите PIN</div>

    <div class="pin-display" id="pinDisplay"></div>

    <div class="keypad">
      <button onclick="press(1)">1</button>
      <button onclick="press(2)">2</button>
      <button onclick="press(3)">3</button>
      <button onclick="press(4)">4</button>
      <button onclick="press(5)">5</button>
      <button onclick="press(6)">6</button>
      <button onclick="press(7)">7</button>
      <button onclick="press(8)">8</button>
      <button onclick="press(9)">9</button>
      <button onclick="clearPin()">C</button>
      <button onclick="press(0)">0</button>
      <button onclick="login()">OK</button>
    </div>
  </div>

</div>

<script>
let pin = "";
let balance = 1000;

function press(num) {
  if (pin.length < 4) {
    pin += num;
    document.getElementById("pinDisplay").innerText = "*".repeat(pin.length);
  }
}

function clearPin() {
  pin = "";
  document.getElementById("pinDisplay").innerText = "";
}

function login() {
  // любой PIN принимается
  showMenu();
}

function showMenu() {
  document.getElementById("screen").innerHTML = `
    <div>Баланс: ${balance}₽</div><br>
    <button onclick="withdraw()">Снять 100</button>
    <button onclick="exit()">Выход</button>
  `;
}

function withdraw() {
  balance -= 100;
  document.getElementById("screen").innerHTML = `
    <div>Вы сняли 100₽</div>
    <div>Баланс: ${balance}₽</div><br>
    <button onclick="exit()">Завершить</button>
  `;
}

function exit() {
  document.getElementById("screen").innerHTML = `
    <div>Пожалуйста, заберите карту и деньги</div>
  `;
}
</script>

</body>
  </html>
